services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: production
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      MCP_PALANTINT_URL: http://localhost:3000
      MCP_SERVICE_TOKEN: ${MCP_SERVICE_TOKEN:-internal_mcp_secret_change_me}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data/assets:/app/assets
      - ./data/private_assets:/app/private_assets

  frontend:
    build:
      context: ./frontend
      target: production
    restart: unless-stopped
    depends_on:
      - backend

  reverse-proxy:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${PROXY_PORT}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
